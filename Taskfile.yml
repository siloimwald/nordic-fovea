version: '3'

tasks:
  check:
    cmds:
      - odin check src -vet -vet-unused-imports -vet-unused -vet-style -vet-cast
  run-rel:
    cmds:
      - odin run src -o:speed -- {{.CLI_ARGS}}
  run:
    cmds:
      - odin run src -- {{.CLI_ARGS}}
  check-leak:
    cmds:
      - odin build src -out:fovea 
      - valgrind --leak-check=full ./fovea {{.CLI_ARGS}}
      - rm fovea
